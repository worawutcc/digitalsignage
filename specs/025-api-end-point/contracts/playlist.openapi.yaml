openapi: 3.0.1
info:
  title: Playlist API
  version: 1.0.0
paths:
  /api/playlists:
    get:
      summary: Get all playlists
      responses:
        '200':
          description: List of playlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Playlist'
    post:
      summary: Create new playlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaylistCreateRequest'
      responses:
        '201':
          description: Playlist created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
  /api/playlists/{id}:
    get:
      summary: Get playlist by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Playlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '404':
          description: Not found
    put:
      summary: Update playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Playlist'
      responses:
        '200':
          description: Playlist updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
    delete:
      summary: Delete playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Playlist deleted
        '404':
          description: Not found
components:
  schemas:
    Playlist:
      type: object
      required:
        - id
        - name
        - mediaItems
        - duration
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        mediaItems:
          type: array
          items:
            type: string
        duration:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        scheduleCount:
          type: integer
    PlaylistCreateRequest:
      type: object
      required:
        - name
        - mediaItems
      properties:
        name:
          type: string
        description:
          type: string
        mediaItems:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
