openapi: 3.0.3
info:
  title: Enhanced Device Registration API
  description: API contracts for device registration with hardware information collection
  version: 1.0.0
  contact:
    name: Digital Signage API
    
servers:
  - url: http://localhost:5000/api
    description: Development server

paths:
  /device/register:
    post:
      summary: Register new device with optional hardware information
      description: Enhanced device registration that accepts hardware specifications from Android TV devices
      operationId: registerDeviceWithHardware
      tags:
        - Device Registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegistrationRequest'
            examples:
              with_hardware:
                summary: Android TV with hardware info
                value:
                  deviceName: "LG Android TV - Living Room"
                  pin: "123456"
                  macAddress: "AA:BB:CC:DD:EE:FF"
                  hardwareInfo:
                    displayWidth: 1920
                    displayHeight: 1080
                    refreshRate: 60.0
                    manufacturer: "LG"
                    model: "OLED55C1PUB"
                    androidVersion: "11"
                    apiLevel: 30
                    supportedFormats: ["MP4", "WebM", "JPEG", "PNG"]
                    codecCapabilities:
                      video: ["H.264", "H.265", "AV1"]
                      audio: ["AAC", "Dolby Digital"]
              legacy_device:
                summary: Legacy device without hardware info
                value:
                  deviceName: "Generic Android TV"
                  pin: "654321"
                  macAddress: "FF:EE:DD:CC:BB:AA"
      responses:
        '201':
          description: Device registration request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceRegistrationResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Device already registered or PIN conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /device/{deviceId}/hardware-profile:
    get:
      summary: Get device hardware profile
      description: Retrieve comprehensive hardware information for a registered device
      operationId: getDeviceHardwareProfile
      tags:
        - Device Hardware
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Device identifier
      responses:
        '200':
          description: Hardware profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceHardwareProfile'
        '404':
          description: Device or hardware profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update device hardware profile
      description: Update hardware information for a device (admin only)
      operationId: updateDeviceHardwareProfile
      tags:
        - Device Hardware
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceHardwareProfileRequest'
      responses:
        '200':
          description: Hardware profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceHardwareProfile'
        '400':
          description: Invalid request data
        '403':
          description: Insufficient permissions
        '404':
          description: Device not found

  /device/{deviceId}/optimized-content:
    get:
      summary: Get device-optimized content URLs
      description: Retrieve media URLs optimized for device's hardware capabilities
      operationId: getOptimizedContent
      tags:
        - Content Delivery
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: mediaIds
          in: query
          required: true
          schema:
            type: array
            items:
              type: integer
              format: int32
          description: Media identifiers to optimize
      responses:
        '200':
          description: Optimized content URLs retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizedContentResponse'
        '404':
          description: Device or media not found

  /admin/hardware-detection/status:
    get:
      summary: Get hardware detection job status
      description: Retrieve status of background hardware detection jobs
      operationId: getHardwareDetectionStatus
      tags:
        - Hardware Detection
      parameters:
        - name: registrationRequestId
          in: query
          schema:
            type: integer
            format: int32
          description: Filter by registration request ID
        - name: status
          in: query
          schema:
            type: string
            enum: [Pending, Processing, Completed, Failed, Retrying]
          description: Filter by detection status
      responses:
        '200':
          description: Hardware detection status retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HardwareDetectionJobStatus'

  /admin/hardware-detection/{jobId}/retry:
    post:
      summary: Retry failed hardware detection
      description: Retry hardware detection for a failed job
      operationId: retryHardwareDetection
      tags:
        - Hardware Detection
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Hardware detection retry initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HardwareDetectionJobStatus'
        '404':
          description: Hardware detection job not found
        '400':
          description: Job cannot be retried

components:
  schemas:
    DeviceRegistrationRequest:
      type: object
      required:
        - deviceName
        - pin
        - macAddress
      properties:
        deviceName:
          type: string
          minLength: 1
          maxLength: 100
          description: Human-readable device name
        pin:
          type: string
          pattern: '^[0-9]{6}$'
          description: 6-digit PIN for device approval
        macAddress:
          type: string
          pattern: '^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$'
          description: Device MAC address
        hardwareInfo:
          $ref: '#/components/schemas/DeviceHardwareInfo'
          description: Optional hardware specifications (Android TV only)

    DeviceHardwareInfo:
      type: object
      properties:
        displayWidth:
          type: integer
          minimum: 1
          description: Display width in pixels
        displayHeight:
          type: integer
          minimum: 1
          description: Display height in pixels
        refreshRate:
          type: number
          format: float
          minimum: 24.0
          maximum: 240.0
          description: Display refresh rate in Hz
        physicalWidth:
          type: number
          format: float
          minimum: 0
          description: Physical screen width in inches
        physicalHeight:
          type: number
          format: float
          minimum: 0
          description: Physical screen height in inches
        densityDpi:
          type: integer
          minimum: 1
          description: Screen density in DPI
        manufacturer:
          type: string
          maxLength: 50
          description: Device manufacturer
        model:
          type: string
          maxLength: 100
          description: Device model
        androidVersion:
          type: string
          maxLength: 20
          description: Android version string
        apiLevel:
          type: integer
          minimum: 21
          description: Android API level (minimum 21 for Android TV)
        buildFingerprint:
          type: string
          maxLength: 200
          description: Android build fingerprint
        supportedFormats:
          type: array
          items:
            type: string
          description: Supported media formats
        codecCapabilities:
          type: object
          description: Codec support information
        additionalSpecs:
          type: object
          description: Additional vendor-specific specifications

    DeviceRegistrationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
          description: Registration request ID
        deviceName:
          type: string
          description: Device name
        pin:
          type: string
          description: Generated PIN
        status:
          type: string
          enum: [Pending, Approved, Rejected]
          description: Registration status
        hasHardwareInfo:
          type: boolean
          description: Whether hardware information was provided
        hardwareDetectionJobId:
          type: integer
          format: int32
          nullable: true
          description: Background job ID for hardware processing
        createdAt:
          type: string
          format: date-time
          description: Registration timestamp

    DeviceHardwareProfile:
      type: object
      properties:
        id:
          type: integer
          format: int32
        deviceId:
          type: integer
          format: int32
        displayWidth:
          type: integer
        displayHeight:
          type: integer
        refreshRate:
          type: number
          format: float
        physicalWidth:
          type: number
          format: float
        physicalHeight:
          type: number
          format: float
        densityDpi:
          type: integer
        manufacturer:
          type: string
        model:
          type: string
        androidVersion:
          type: string
        apiLevel:
          type: integer
        buildFingerprint:
          type: string
        supportedFormats:
          type: object
          description: JSON array of supported formats
        codecCapabilities:
          type: object
          description: JSON object of codec capabilities
        additionalSpecs:
          type: object
          description: JSON object of additional specifications
        detectedAt:
          type: string
          format: date-time
        isAutoDetected:
          type: boolean
        detectionSource:
          type: string
          enum: [system, manual, default]

    UpdateDeviceHardwareProfileRequest:
      type: object
      properties:
        displayWidth:
          type: integer
          minimum: 1
        displayHeight:
          type: integer  
          minimum: 1
        refreshRate:
          type: number
          format: float
          minimum: 24.0
          maximum: 240.0
        manufacturer:
          type: string
          maxLength: 50
        model:
          type: string
          maxLength: 100
        additionalSpecs:
          type: object

    OptimizedContentResponse:
      type: object
      properties:
        deviceId:
          type: integer
          format: int32
        optimizedMedia:
          type: array
          items:
            $ref: '#/components/schemas/OptimizedMediaItem'

    OptimizedMediaItem:
      type: object
      properties:
        mediaId:
          type: integer
          format: int32
        originalUrl:
          type: string
          format: uri
        optimizedVariants:
          type: array
          items:
            $ref: '#/components/schemas/MediaVariant'

    MediaVariant:
      type: object
      properties:
        id:
          type: integer
          format: int32
        width:
          type: integer
        height:
          type: integer
        quality:
          type: string
          enum: [high, medium, low, original]
        fileSize:
          type: integer
          format: int64
        format:
          type: string
        cloudFrontUrl:
          type: string
          format: uri
        targetResolution:
          type: string
          nullable: true
        isOriginal:
          type: boolean

    HardwareDetectionJobStatus:
      type: object
      properties:
        id:
          type: integer
          format: int32
        deviceRegistrationRequestId:
          type: integer
          format: int32
        status:
          type: string
          enum: [Pending, Processing, Completed, Failed, Retrying]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        errorMessage:
          type: string
          nullable: true
        retryCount:
          type: integer
        profileCreated:
          type: boolean
        deviceHardwareProfileId:
          type: integer
          format: int32
          nullable: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
        details:
          type: object
          description: Additional error details
        timestamp:
          type: string
          format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for admin authentication

security:
  - BearerAuth: []